```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SALA AZUL</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=VT323&display=swap");

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
background:url("background.png"),linear-gradient(to bottom,#000000,#0a0003);
font-family:"VT323",monospace;
color:#00fcff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.crt-container{width:800px;height:600px;position:relative;}

.crt{
width:100%;
height:100%;
background:black;
border:4px solid #00c5c9;
border-radius:10px;
box-shadow:0 0 20px #00c5c9;
overflow:hidden;
position:relative;
}

.scanlines,.flicker,.vignette{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.scanlines{
background:linear-gradient(to bottom,rgba(0,255,255,.03),rgba(0,255,255,.1),rgba(0,255,255,.03));
background-size:100% 4px;
}

.flicker{
background:rgba(0,0,0,.05);
animation:flicker .3s infinite;
}

@keyframes flicker{
0%,20%,100%{opacity:.1}
25%{opacity:.5}
30%{opacity:.2}
}

.vignette{box-shadow:inset 0 0 100px rgba(0,0,0,.7)}

.menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.menu h1{
font-size:70px;
margin-bottom:40px;
text-shadow:0 0 20px #00fcff;
}

.menu button{
font-family:"VT323",monospace;
font-size:28px;
margin:10px;
padding:10px 40px;
background:black;
color:#00fcff;
border:2px solid #00c5c9;
cursor:pointer;
box-shadow:0 0 10px #00c5c9;
}

.menu-message{
margin-top:20px;
font-size:20px;
white-space:pre-line;
}

.container{
display:none;
flex-direction:column;
width:100%;
height:100%;
padding:25px;
gap:10px;
}

.title{text-align:center;font-size:26px}

.status-bar{
display:flex;
justify-content:space-between;
font-size:16px;
}

.image-box{
display:flex;
justify-content:center;
align-items:center;
height:320px;
}

.image-box img{
max-height:80%;
border:4px solid #00c5c9;
border-radius:10px;
box-shadow:0 0 20px #00c5c9;
}

.message-box{text-align:center;font-size:18px;font-weight:bold}

.hint-box{text-align:center;font-size:14px;color:#8bfaff}

.input-container{
display:flex;
justify-content:center;
}

#answer-input{
width:100%;
max-width:480px;
background:rgba(0,255,255,.1);
border:2px solid #00c5c9;
border-radius:8px;
padding:12px;
font-family:"VT323",monospace;
font-size:22px;
color:#00fcff;
text-align:center;
pointer-events:none;
}

/* TECLADO */

.virtual-keyboard{
display:none;
flex-direction:column;
align-items:center;
gap:6px;
margin-top:10px;
}

.kb-row{
display:flex;
justify-content:center;
gap:6px;
flex-wrap:wrap;
}

.virtual-keyboard button{
font-family:"VT323",monospace;
font-size:22px;
width:45px;
height:45px;
background:black;
color:#00fcff;
border:2px solid #00c5c9;
border-radius:6px;
box-shadow:0 0 8px #00c5c9;
cursor:pointer;
}

.kb-space{width:140px}
.kb-enter{width:90px}
.kb-back{width:60px}

</style>
</head>

<body>

<div class="crt-container">
<div class="crt">

<div class="scanlines"></div>
<div class="flicker"></div>
<div class="vignette"></div>

<div class="menu" id="menu">
<h1>SALA AZUL</h1>
<button id="startBtn">INICIAR</button>
<button id="helpBtn">INSTRUÇÕES</button>
<p class="menu-message" id="menu-message"></p>
</div>

<div class="container" id="game-container">

<h1 class="title">Digite o que você vê na imagem</h1>

<div class="status-bar">
<div id="timer">Tempo restante: 120s</div>
<div id="attempts">Tentativas: 3</div>
<div id="memory">Memória Instável: 0%</div>
</div>

<div class="image-box">
<img id="game-image">
</div>

<div class="message-box" id="message"></div>
<div class="hint-box" id="hint"></div>

<div class="input-container">
<input id="answer-input" readonly inputmode="none" placeholder="Digite sua resposta...">
</div>

<!-- TECLADO -->

<div class="virtual-keyboard" id="keyboard">

<div class="kb-row">
<button>Q</button><button>W</button><button>E</button><button>R</button><button>T</button>
<button>Y</button><button>U</button><button>I</button><button>O</button><button>P</button>
</div>

<div class="kb-row">
<button>A</button><button>S</button><button>D</button><button>F</button>
<button>G</button><button>H</button><button>J</button><button>K</button><button>L</button>
</div>

<div class="kb-row">
<button>Z</button><button>X</button><button>C</button><button>V</button>
<button>B</button><button>N</button><button>M</button>
</div>

<div class="kb-row">
<button>0</button><button>1</button><button>2</button><button>3</button>
<button>4</button><button>5</button><button>6</button><button>7</button>
<button>8</button><button>9</button>
</div>

<div class="kb-row">
<button class="kb-space">ESPAÇO</button>
<button class="kb-back">⌫</button>
<button class="kb-enter">ENTER</button>
</div>

</div>

</div>

<audio id="sound-enter" src="enter.wav"></audio>
<audio id="sound-correct" src="correct.wav"></audio>
<audio id="sound-wrong" src="wrong.wav"></audio>
<audio id="sound-typing" src="typing.wav"></audio>

</div>
</div>

<script>

const keyboard = document.getElementById("keyboard");
const answerInputEl = document.getElementById("answer-input");

const startBtn = document.getElementById("startBtn");
const helpBtn = document.getElementById("helpBtn");

const menu = document.getElementById("menu");
const gameContainer = document.getElementById("game-container");
const menuMessage = document.getElementById("menu-message");

const messageEl = document.getElementById("message");
const hintEl = document.getElementById("hint");

const soundEnter = document.getElementById("sound-enter");
const soundCorrect = document.getElementById("sound-correct");
const soundWrong = document.getElementById("sound-wrong");
const soundTyping = document.getElementById("sound-typing");

const IMAGES_AND_ANSWERS = [
{image:"imagens/imagem1.png",answers:["flor murcha","planta murcha"]},
{image:"imagens/imagem2.png",answers:["boneco sem olhos"]},
{image:"imagens/imagem3.png",answers:["numero 3","3 riscado"]},
{image:"imagens/imagem4.png",answers:["vela e sombra"]},
{image:"imagens/imagem5.png",answers:["espiral"]}
];

let currentIndex=0;

startBtn.onclick=()=>{
menu.style.display="none";
gameContainer.style.display="flex";
keyboard.style.display="flex";
mostrarImagem();
soundEnter.play();
};

helpBtn.onclick=()=>{
menuMessage.textContent=
"Observe a imagem e descreva o que vê.\n"+
"Use palavras simples.\n"+
"3 tentativas por imagem.";
};

function mostrarImagem(){
document.getElementById("game-image").src=IMAGES_AND_ANSWERS[currentIndex].image;
answerInputEl.value="";
messageEl.textContent="";
}

function verificarResposta(){

const resposta=answerInputEl.value.trim().toLowerCase();
const respostas=IMAGES_AND_ANSWERS[currentIndex].answers;

if(respostas.includes(resposta)){
soundCorrect.play();
messageEl.textContent="Resposta correta!";
currentIndex++;

setTimeout(()=>{
if(currentIndex>=IMAGES_AND_ANSWERS.length){
messageEl.textContent="Você completou o protocolo.";
keyboard.style.display="none";
}else{
mostrarImagem();
}
},1200);

}else{
soundWrong.play();
messageEl.textContent="INCORRETO!";
}

answerInputEl.value="";
}

document.querySelectorAll("#keyboard button").forEach(btn=>{
btn.onclick=()=>{

const key=btn.textContent;

if(key==="ENTER"){
verificarResposta();
return;
}

if(key==="⌫"){
answerInputEl.value=answerInputEl.value.slice(0,-1);
return;
}

if(key==="ESPAÇO"){
answerInputEl.value+=" ";
return;
}

answerInputEl.value+=key.toLowerCase();

soundTyping.currentTime=0;
soundTyping.play();

};
});

</script>

</body>
</html>
```
